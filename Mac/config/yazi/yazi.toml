# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
# 三栏宽度比例: 父目录 / 当前目录 / 预览栏。预览栏给大一点，适合看代码、图片和 PDF。
ratio = [ 1, 3, 5 ]

# 默认用自然排序: 1.md, 2.md, 10.md；目录始终排在文件前面。
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false

# 每行右侧显示文件大小；需要看时间或权限时可用 keymap 里的 m m / m p 临时切换。
linemode = "size"

# 默认不显示隐藏文件；按 . 仍可临时切换显示/隐藏。
show_hidden  = false
show_symlink = true

# 光标上下保留几行上下文，快速滚动时不容易丢位置。
scrolloff = 8

# 保留点击和滚轮支持。需要绝对键盘流时可设为 []。
mouse_events = [ "click", "scroll" ]

# 终端标题显示当前目录，多个 yazi 窗口时好区分。
title_format = "Yazi: {cwd}"

[preview]
# 代码预览不自动折行，保留真实缩进和长行；按 J/K 可滚动预览内容。
wrap = "no"

# 代码缩进宽度。
tab_size = 2

# 图片/PDF 预览上限。改动后运行 `yazi --clear-cache` 让旧缩略图失效。
max_width  = 1600
max_height = 1600

# 留空表示使用系统缓存目录，重启后可自动清理。
cache_dir = ""

# 快速移动光标时稍等再渲染图片，减少终端闪烁和卡顿。
image_delay = 50

# lanczos3 质量最好但更耗 CPU；当前机器依赖齐全，优先预览质量。
image_filter  = "lanczos3"
image_quality = 90

# iTerm2/Kitty/Sixel 等正常情况下不需要偏移；如图片错位再按终端微调。
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
# 文本和代码默认用 nvim，在主屏阻塞打开，退出编辑器后回到 yazi。
edit = [
	{ run = "nvim %s", desc = "nvim", for = "unix", block = true },
]

# macOS 默认应用打开文件。`%s` 会传入所有选中文件。
open = [
	{ run = "open %s", desc = "Open", for = "macos" },
]

# 在 Finder 中定位当前文件，只对第一个选中项执行。
reveal = [
	{ run = "open -R %s1", desc = "Reveal in Finder", for = "macos" },
]

# 音视频也交给 macOS 默认应用，避免依赖未安装的 mpv/mediainfo。
play = [
	{ run = "open %s", desc = "Play", for = "macos" },
]

# 压缩包解压使用 yazi 内置 extract 消息，由 7-Zip 后端处理。
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]

# 远程/VFS 文件需要先下载；保留官方默认行为。
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S", desc = "Download" },
]

[open]
# 只把常见代码/配置文件提前匹配到 nvim；其他类型继续走 yazi 默认规则。
prepend_rules = [
	{ url = "*.{c,cc,cpp,go,java,js,jsx,lua,md,py,rs,sh,swift,ts,tsx,vue}", use = [ "edit", "reveal" ] },
	{ url = "*.{json,jsonc,toml,yaml,yml,xml,ini,conf,env}", use = [ "edit", "reveal" ] },
]

[tasks]
# 并发数保持适中，既能并行生成预览，也不会把日常终端拖慢。
micro_workers = 10
macro_workers = 10

# 偶发 IO/解码异常重试次数。
bizarre_retry = 3

# 单张图片最多用 512MB 解码，最大 10000x10000，避免超大图拖垮会话。
image_alloc = 536870912
image_bound = [ 10000, 10000 ]

# 预加载任务仍显示在任务列表里，方便排查慢预览。
suppress_preload = false

[input]
# 输入框光标不闪，减少视觉干扰。
cursor_blink = false

# 常用输入框放在上方居中；rename 跟随当前文件，减少视线移动。
cd_title      = "Change directory:"
cd_origin     = "top-center"
cd_offset     = [ 0, 2, 60, 3 ]
create_title  = [ "Create:", "Create directory:" ]
create_origin = "top-center"
create_offset = [ 0, 2, 60, 3 ]
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 60, 3 ]
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 60, 3 ]
find_title    = [ "Find next:", "Find previous:" ]
find_origin   = "top-center"
find_offset   = [ 0, 2, 60, 3 ]
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 60, 3 ]
shell_title   = [ "Shell:", "Shell (block):" ]
shell_origin  = "top-center"
shell_offset  = [ 0, 2, 70, 3 ]

[confirm]
# 删除/覆盖类确认框居中，并给足宽度显示长路径。
trash_title      = "Trash {n} selected file{s}?"
trash_origin     = "center"
trash_offset     = [ 0, 0, 70, 20 ]
delete_title     = "Permanently delete {n} selected file{s}?"
delete_origin    = "center"
delete_offset    = [ 0, 0, 70, 20 ]
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 60, 15 ]
quit_title       = "Quit?"
quit_body        = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin      = "center"
quit_offset      = [ 0, 0, 60, 15 ]

[pick]
# Open with 菜单跟随当前文件，选应用时上下文更清楚。
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 60, 7 ]

[which]
# which-key 保持配置顺序，不再额外排序，和 keymap.toml 注释的顺序一致。
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
