# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]

# 只追加/覆盖少量高频键位；没有列出的键继续使用 yazi 官方默认键位。
prepend_keymap = [
	# 导航边界: 只允许在 /Users/cj 下面移动，避免 h/Enter/交互 cd 跳出用户目录。
	{ on = "h", run = "plugin cj-only leave", desc = "Leave, limited to /Users/cj" },
	{ on = "<Left>", run = "plugin cj-only leave", desc = "Leave, limited to /Users/cj" },
	{ on = "l", run = "plugin cj-only enter", desc = "Enter, limited to /Users/cj" },
	{ on = "<Right>", run = "plugin cj-only enter", desc = "Enter, limited to /Users/cj" },
	{ on = "<Enter>", run = "plugin cj-only open", desc = "Open or enter, limited to /Users/cj" },
	{ on = [ "g", "<Space>" ], run = "plugin cj-only root", desc = "Go to /Users/cj root" },
	{ on = "H", run = "plugin cj-only block-history", desc = "History back disabled by /Users/cj boundary" },
	{ on = "L", run = "plugin cj-only block-history", desc = "History forward disabled by /Users/cj boundary" },
	{ on = [ "g", "f" ], run = "plugin cj-only block-follow", desc = "Follow symlink disabled by /Users/cj boundary" },

	# 常用位置跳转。g d 是默认下载目录；这里保留并补充 dotfiles/yazi 配置。
	{ on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go to Downloads" },
	{ on = [ "g", "D" ], run = "cd ~/Desktop", desc = "Go to Desktop" },
	{ on = [ "g", "o" ], run = "cd ~/Documents", desc = "Go to Documents" },
	{ on = [ "g", "r" ], run = "cd /Users/cj/Jun_Dotfiles", desc = "Go to dotfiles repo" },
	{ on = [ "g", "y" ], run = "cd ~/.config/yazi", desc = "Go to Yazi config" },

	# 搜索: fd 按文件名查找，rg 按文件内容查找；两者当前机器都已安装。
	{ on = "s", run = "search --via=fd", desc = "Search files by name" },
	{ on = "S", run = "search --via=rg", desc = "Search files by content" },

	# 快速打开交互式选择器。z/fzf 只在当前目录树里查找；Z/zoxide 可跳到任意历史目录，所以禁用。
	{ on = "z", run = "plugin fzf", desc = "Jump with fzf" },
	{ on = "Z", run = "plugin cj-only block-zoxide", desc = "Zoxide disabled by /Users/cj boundary" },

	# 复制路径信息，比 Ctrl-C 更适合终端里使用，避免和中断/关闭动作冲突。
	{ on = [ "c", "a" ], run = "copy path", desc = "Copy absolute path" },
	{ on = [ "c", "d" ], run = "copy dirname", desc = "Copy directory path" },
	{ on = [ "c", "f" ], run = "copy filename", desc = "Copy filename" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy filename without extension" },

	# 排序和行信息。逗号开头负责排序，m 开头负责切换行右侧信息。
	{ on = [ ",", "n" ], run = [ "sort natural --reverse=no", "linemode size" ], desc = "Sort naturally" },
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse", "linemode mtime" ], desc = "Sort by modified time, newest first" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse", "linemode size" ], desc = "Sort by size, largest first" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no", desc = "Sort by extension" },
	{ on = [ "m", "s" ], run = "linemode size", desc = "Show size in file list" },
	{ on = [ "m", "m" ], run = "linemode mtime", desc = "Show modified time in file list" },
	{ on = [ "m", "p" ], run = "linemode permissions", desc = "Show permissions in file list" },
	{ on = [ "m", "n" ], run = "linemode none", desc = "Hide file list metadata" },

	# 文件操作。普通 d 进回收站，永久删除仍用 D 并保留确认框。
	{ on = "d", run = "remove", desc = "Move selected files to trash" },
	{ on = "D", run = "remove --permanently", desc = "Permanently delete selected files" },
	{ on = "a", run = "create", desc = "Create file or directory" },
	{ on = "r", run = "rename --cursor=before_ext", desc = "Rename before extension" },
	{ on = "O", run = "open --interactive", desc = "Open with..." },

	# 任务和帮助。
	{ on = "w", run = "tasks:show", desc = "Show task manager" },
	{ on = "~", run = "help", desc = "Open help" },
]

[input]

# 输入框里保留类 shell / vim 的移动和编辑习惯；未覆盖的键使用官方默认。
prepend_keymap = [
	{ on = "<C-a>", run = "move bol", desc = "Move to beginning of line" },
	{ on = "<C-e>", run = "move eol", desc = "Move to end of line" },
	{ on = "<C-u>", run = "kill bol", desc = "Kill backward to beginning of line" },
	{ on = "<C-k>", run = "kill eol", desc = "Kill forward to end of line" },
	{ on = "<C-w>", run = "kill backward", desc = "Kill backward word" },
]
